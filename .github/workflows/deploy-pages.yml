name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OSRS_CLONE_SOURCE_ROOT: ${{ github.workspace }}/osrs-clone-source
    steps:
      - name: Checkout codex repo
        uses: actions/checkout@v4

      - name: Checkout OSRS Clone repo
        uses: actions/checkout@v4
        with:
          repository: Pazneria/osrs-clone
          path: osrs-clone-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate codex data
        run: npm run check

      - name: Build codex site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/osrs-clone-codex

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
